<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edith's Checklist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Landing Page -->
  <div id="landing" class="page active">
    <header class="landing-header">
      <div class="logo">
        <span class="logo-icon">&#127793;</span>
        <h1>Edith's Checklist</h1>
      </div>
    </header>
    <main class="home-cards">
      <button class="home-card image-card" onclick="openHouse('farm-house')">
        <img src="assets/farm-house.png" alt="Farm House" class="card-bg">
        <div class="card-overlay"></div>
        <div class="card-content">
          <h2>Farm House</h2>
        </div>
      </button>
      <button class="home-card image-card" onclick="openHouse('16-north-rd')">
        <img src="assets/16-north-rd.png" alt="16 North Rd" class="card-bg">
        <div class="card-overlay"></div>
        <div class="card-content">
          <h2>16 North Rd</h2>
        </div>
      </button>
    </main>
    <footer class="landing-footer">
      <p>&copy; 2026 Edith's Checklist</p>
    </footer>
  </div>

  <!-- Checklist Page -->
  <div id="checklist" class="page">
    <header class="checklist-header">
      <button class="back-btn" onclick="goHome()" aria-label="Back to homes">
        <span class="back-arrow">&larr;</span> Back
      </button>
      <h1 id="house-title"></h1>
    </header>

    <div class="progress-bar-container">
      <div class="progress-text" id="progress-text">0 of 0 tasks complete</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <main class="checklist-body" id="checklist-body"></main>

    <div class="reset-container">
      <button class="reset-btn" onclick="resetChecklist()">
        <span>&#8635;</span> Reset Checklist
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
